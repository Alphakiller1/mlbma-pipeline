<script>
var TABS = MLBMA_CONFIG.SHEET_TABS;
var SHEET_ID = MLBMA_CONFIG.SHEET_ID;
var PLATOON_GAP = 8;
var HOME_AWAY_GAP = 10;
var WINDOW_GAP = 8;

var ALL_TEAMS = [
  'ARI','ATH','ATL','BAL','BOS','CHC','CHW','CIN','CLE','COL','DET','HOU','KCR','LAA','LAD',
  'MIA','MIL','MIN','NYM','NYY','PHI','PIT','SDP','SEA','SFG','STL','TBR','TEX','TOR','WSN'
];

var TEAM_NAMES = {
  ARI:'Arizona Diamondbacks', ATH:'Athletics', ATL:'Atlanta Braves', BAL:'Baltimore Orioles',
  BOS:'Boston Red Sox', CHC:'Chicago Cubs', CHW:'Chicago White Sox', CIN:'Cincinnati Reds',
  CLE:'Cleveland Guardians', COL:'Colorado Rockies', DET:'Detroit Tigers', HOU:'Houston Astros',
  KCR:'Kansas City Royals', KC:'Kansas City Royals', LAA:'Los Angeles Angels', LAD:'Los Angeles Dodgers',
  MIA:'Miami Marlins', MIL:'Milwaukee Brewers', MIN:'Minnesota Twins', NYM:'New York Mets',
  NYY:'New York Yankees', PHI:'Philadelphia Phillies', PIT:'Pittsburgh Pirates', SDP:'San Diego Padres',
  SEA:'Seattle Mariners', SFG:'San Francisco Giants', STL:'St. Louis Cardinals', TBR:'Tampa Bay Rays',
  TEX:'Texas Rangers', TOR:'Toronto Blue Jays', WSN:'Washington Nationals'
};

var OSI_TIERS = [[85,'Elite'],[75,'High'],[65,'Dangerous'],[50,'Inconsistent'],[0,'Weak']];
var PITCH_TIERS = [[85,'Ace'],[70,'Solid'],[55,'Average'],[0,'Volatile']];

var DATA = { profiles: [], batters: [], sps: [], bullpen: [], bullpenUnit: [], spMetricSplits: [], registry: [], matchups: [], matchupsEnriched: [], lineups: [], lineupsParsed: [], weather: [], pitchTeams: [], metricsR: [], metricsL: [], batterSplitsR: [], batterSplitsL: [], batterSplitsOverall: [], batterSplitsRecent: [], batterSplitsHome: [], batterSplitsAway: [], batterSplitsVsSp: [], batterSplitsVsRp: [], batterRatePool: [], results: [], palsMap: {} };
var STATE = {
  team: 'NYY',
  splitByCategory: { lineup: 'both', rotation: 'overall', bullpen: 'overall' },
  splitBySection: {
    identity: 'both',
    offense: 'both',
    batting: 'both',
    schedule: 'both',
    sustainability: 'both'
  },
  windowBySection: { surface: 'YTD' },
  window: 'YTD',
  category: 'lineup',
  chartMetric: 'osi',
  battingSplitTab: 'season'
};

var DEFAULT_SECTION_SPLITS = {
  identity: 'both',
  offense: 'both',
  batting: 'both',
  schedule: 'both',
  sustainability: 'both',
  rotation: 'overall',
  bullpen: 'overall'
};

var LINEUP_SPLIT_SECTIONS = ['identity', 'offense', 'batting', 'schedule', 'sustainability'];
var VALID_UNIT_CATEGORIES = { lineup: true, rotation: true, bullpen: true };

function normalizeUnitCategory(raw) {
  var v = String(raw || '').trim().toLowerCase();
  if (v === 'starters' || v === 'sp') return 'rotation';
  if (v === 'bp' || v === 'relievers') return 'bullpen';
  if (v === 'offense' || v === 'batting') return 'lineup';
  return VALID_UNIT_CATEGORIES[v] ? v : null;
}

function parseUnitCategoryFromParams(params) {
  if (!params) return 'lineup';
  var raw = params.get('unit') || params.get('category') || params.get('tab');
  return normalizeUnitCategory(raw) || 'lineup';
}

function syncTeamProfileUrl() {
  if (!window.history || !window.history.replaceState) return;
  var params = new URLSearchParams(window.location.search);
  params.set('team', STATE.team);
  var cat = STATE.category || 'lineup';
  if (cat === 'lineup') params.delete('unit');
  else params.set('unit', cat);
  var qs = params.toString();
  var next = window.location.pathname + (qs ? '?' + qs : '');
  var cur = window.location.pathname + window.location.search;
  if (cur !== next) history.replaceState(null, '', next);
}

function syncLineupSectionSplits(split) {
  if (!STATE.splitBySection) STATE.splitBySection = Object.assign({}, DEFAULT_SECTION_SPLITS);
  LINEUP_SPLIT_SECTIONS.forEach(function(key) {
    STATE.splitBySection[key] = split;
  });
  saveSplitForCategory('lineup', split);
}

function activeSplit() {
  var cat = STATE.category || 'lineup';
  if (!STATE.splitByCategory) STATE.splitByCategory = { lineup: 'both', rotation: 'overall', bullpen: 'overall' };
  return STATE.splitByCategory[cat] || (cat === 'lineup' ? 'both' : 'overall');
}

function activeSectionSplit(sectionKey) {
  if (sectionKey === 'rotation' || sectionKey === 'bullpen') {
    return activeSplit();
  }
  if (!STATE.splitBySection) STATE.splitBySection = Object.assign({}, DEFAULT_SECTION_SPLITS);
  return STATE.splitBySection[sectionKey] || DEFAULT_SECTION_SPLITS[sectionKey] || 'both';
}

function saveSectionSplit(sectionKey, split) {
  if (sectionKey === 'rotation' || sectionKey === 'bullpen') {
    saveSplitForCategory(sectionKey, split);
    return;
  }
  if (!STATE.splitBySection) STATE.splitBySection = Object.assign({}, DEFAULT_SECTION_SPLITS);
  STATE.splitBySection[sectionKey] = split;
}

function activeSectionWindow(sectionKey) {
  if (!STATE.windowBySection) STATE.windowBySection = { surface: 'YTD' };
  return STATE.windowBySection[sectionKey] || STATE.window || 'YTD';
}

function saveSectionWindow(sectionKey, windowKey) {
  if (!STATE.windowBySection) STATE.windowBySection = { surface: 'YTD' };
  STATE.windowBySection[sectionKey] = windowKey;
}

function sectionCtx(baseCtx, sectionKey, prof) {
  prof = prof || profileRow(STATE.team) || {};
  baseCtx = baseCtx || {};
  var split = activeSectionSplit(sectionKey);
  var windowKey = sectionKey === 'surface' ? activeSectionWindow('surface') : (baseCtx.window || STATE.window);
  var PC = window.MLBMAProfileControls;
  var c = Object.assign({}, baseCtx, {
    split: split,
    splitLabel: PC && PC.splitLabel ? PC.splitLabel(split) : split,
    sectionKey: sectionKey,
    window: windowKey,
    windowLabel: windowKey === 'YTD' ? 'Season' : windowKey
  });
  if (window.TeamProfileMini && TeamProfileMini.resolveOffenseRates) {
    var rates = TeamProfileMini.resolveOffenseRates(prof, c);
    if (rates.wrc != null) c.wrc = rates.wrc;
  }
  return c;
}

function saveSplitForCategory(cat, split) {
  if (!STATE.splitByCategory) STATE.splitByCategory = { lineup: 'both', rotation: 'overall', bullpen: 'overall' };
  STATE.splitByCategory[cat] = split;
}

function syncSplitFromCategory() {
  STATE.split = activeSplit();
}

function gvizUrl(tab) {
  var bust = window.MLBMA_SHEET_BUST != null ? window.MLBMA_SHEET_BUST : Date.now();
  return 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:csv&sheet=' + encodeURIComponent(tab) + '&_b=' + encodeURIComponent(String(bust));
}

function applySheetSyncBust(lastUpdated) {
  var ts = lastUpdated ? String(lastUpdated).trim() : String(Date.now());
  window.MLBMA_SHEET_BUST = ts;
  try { sessionStorage.setItem('mlbma_sheet_sync_ts', ts); } catch (e) { /* ignore */ }
}

function parseCSVLine(line) {
  var out = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { out.push(cur); cur = ''; continue; }
    cur += c;
  }
  out.push(cur);
  return out;
}

function parseCSV(text) {
  var lines = text.trim().split('\n');
  if (!lines.length) return [];
  var headers = parseCSVLine(lines[0]).map(function(h) { return h.replace(/^"|"$/g, '').trim(); });
  return lines.slice(1).map(function(line) {
    var vals = parseCSVLine(line);
    var row = {};
    headers.forEach(function(h, i) { row[h] = (vals[i] || '').replace(/^"|"$/g, '').trim(); });
    return row;
  });
}

function fetchSheetTab(tabName) {
  if (window.MLBMASharedMatchup && MLBMASharedMatchup.fetchSheetTab) {
  return MLBMASharedMatchup.fetchSheetTab(tabName);
  }
  return fetch(gvizUrl(tabName), { cache: 'no-store' }).then(function(r) {
    if (!r.ok) throw new Error('fetch ' + tabName);
    return r.text();
  }).then(parseCSV);
}

function pickCol(row, names) {
  for (var i = 0; i < names.length; i++) {
    if (row[names[i]] !== undefined && row[names[i]] !== '') return row[names[i]];
  }
  return '';
}

var EM_DASH = '\u2014';

function num(v) {
  if (v === null || v === undefined || v === '' || v === EM_DASH || v === '?' || v === '\uFFFD') return null;
  var n = parseFloat(String(v).replace('%',''));
  return isNaN(n) ? null : n;
}

function fmt(v, d) {
  if (v === null || isNaN(v)) return EM_DASH;
  return Number(v).toFixed(d === undefined ? 1 : d);
}

function fmtSlashStat(v) {
  if (v == null || v === '' || isNaN(v)) return '—';
  var n = Number(v);
  var s = n.toFixed(3);
  if (Math.abs(n) < 1 && Math.abs(n) > 0) s = s.replace(/^-0\./, '-.').replace(/^0\./, '.');
  return s;
}

function rateStatCell(v, context) {
  var A = window.MLBMAAssets;
  if (v == null || v === '' || isNaN(v)) {
    if (A && A.chipPlaceholderHtml) return A.chipPlaceholderHtml('—');
    return '<span class="tp-rate-stat">' + escHtml('—') + '</span>';
  }
  var n = Number(v);
  var display = fmtSlashStat(n);
  if (A && A.valChipHtml) {
    return A.valChipHtml(n, context || 'woba', false, 3, { display: display });
  }
  if (A && A.metricColor) {
    var color = A.metricColor(n, context || 'woba', false);
    return '<span class="tp-rate-stat" style="color:' + color + '">' + escHtml(display) + '</span>';
  }
  return '<span class="tp-rate-stat">' + escHtml(display) + '</span>';
}

function registerBatterRatePools() {
  var A = window.MLBMAAssets;
  if (!A || !A.registerLeaguePool) return;
  var keys = ['ops', 'obp', 'iso', 'woba'];
  var cols = {
    ops: ['OPS', 'ops'],
    obp: ['OBP', 'obp'],
    iso: ['ISO', 'iso'],
    woba: ['wOBA', 'woba']
  };
  var buckets = { ops: [], obp: [], iso: [], woba: [] };
  (DATA.batterRatePool || []).forEach(function(row) {
    keys.forEach(function(k) {
      var v = num(pickCol(row, cols[k]));
      if (v != null) buckets[k].push(v);
    });
  });
  keys.forEach(function(k) {
    if (buckets[k].length >= 20) A.registerLeaguePool(k, buckets[k]);
  });
}

function registerRpgPool() {
  var A = window.MLBMAAssets;
  if (!A || !A.registerLeaguePool) return;
  var values = (DATA.results || []).map(function(row) {
    return runsPerGameForTeam(teamKey(pickCol(row, ['team', 'Team', 'tm'])));
  }).filter(function(v) { return v != null && !isNaN(v); });
  if (values.length >= 20) A.registerLeaguePool('rpg', values);
}

function registryPlayerId(name, team) {
  var reg = findRegistryEntry(name, team);
  if (!reg) return null;
  var pid = pickCol(reg, ['player_id', 'Player_ID', 'mlb_id', 'MLB_ID']);
  return pid != null && String(pid).trim() !== '' ? String(pid).trim() : null;
}

function batterLineupAvatar(name, team, profileName, eager) {
  var A = window.MLBMAAssets;
  if (!A || !A.pitcherAvatar) return '';
  var pid = registryPlayerId(name, team);
  if (!pid && A.resolveMlbId) pid = A.resolveMlbId(profileName || name);
  return A.pitcherAvatar(pid || profileName || name, {
    size: 32,
    crop: 'matchup',
    className: 'tp-batter-avatar',
    eager: !!eager,
    lazy: !eager
  });
}

function batterPlayerCellHtml(displayName, profileName, team, eager) {
  var avatar = batterLineupAvatar(displayName, team, profileName, eager);
  var href = 'batter_profile.html?player=' + encodePlayer(profileName);
  return '<div class="tp-batter-player-cell">'
    + avatar
    + '<a class="tp-batter-player-link" href="' + href + '">' + escHtml(displayName) + '</a>'
    + '</div>';
}

function spPlayerAvatar(spRow, eager) {
  var A = window.MLBMAAssets;
  if (!A || !A.pitcherAvatar) return '';
  var pid = pickCol(spRow, ['pitcher_id', 'player_id', 'mlb_id', 'MLB_ID']);
  var pname = pickCol(spRow, ['pitcher_name', 'Pitcher', 'name']);
  if (pid && A.resolveMlbId) {
    var resolved = A.resolveMlbId(pid);
    if (resolved) pid = resolved;
  }
  return A.pitcherAvatar(pid || pname, {
    size: 32,
    crop: 'matchup',
    className: 'tp-sp-avatar',
    eager: !!eager,
    lazy: !eager
  });
}

function spPlayerCellHtml(spRow, eager) {
  var pname = pickCol(spRow, ['pitcher_name', 'Pitcher', 'name']) || '';
  var handRaw = String(pickCol(spRow, ['pitcher_hand', 'Hand', 'hand']) || '').trim();
  var hand = handRaw ? handRaw.charAt(0).toUpperCase() : '';
  var avatar = spPlayerAvatar(spRow, eager);
  var href = 'pitcher_profile.html?pitcher=' + encodePlayer(pname);
  return '<div class="tp-sp-player-cell tp-batter-player-cell">'
    + avatar
    + '<a class="tp-sp-player-link tp-rotation-sp-link" href="' + href + '" title="Open full Pitcher Profile">'
    + escHtml(pname)
    + (hand ? '<span class="tp-sp-player-hand">' + escHtml(hand) + '</span>' : '')
    + '<span class="tp-sp-player-link__cue" aria-hidden="true">&rarr;</span></a>'
    + '</div>';
}

function teamKey(t) {
  var k = String(t || '').trim().toUpperCase();
  if (k === 'KC') return 'KCR';
  if (k === 'AZ') return 'ARI';
  if (k === 'WSH' || k === 'WAS') return 'WSN';
  if (k === 'TB') return 'TBR';
  if (k === 'SF') return 'SFG';
  if (k === 'SD') return 'SDP';
  if (k === 'CWS') return 'CHW';
  return k;
}

function tierLabel(val, tiers) {
  if (val === null) return { label: EM_DASH, cls: '' };
  for (var i = 0; i < tiers.length; i++) {
    if (val >= tiers[i][0]) return { label: tiers[i][1], cls: 'tier-' + tiers[i][1].toLowerCase().replace(/\s/g,'') };
  }
  return { label: EM_DASH, cls: '' };
}

function osiColor(v) {
  if (v === null) return 'var(--text-3)';
  if (v >= 75) return 'var(--green)';
  if (v >= 60) return 'var(--gold)';
  return 'var(--red-l)';
}

function valChip(v, ctx, invert, dec) {
  var assets = window.MLBMAAssets;
  if (assets && assets.valChipHtml) return assets.valChipHtml(v, ctx || 'osi', invert, dec == null ? 1 : dec);
  return '<span class="chip c-na">' + fmt(v, dec == null ? 1 : dec) + '</span>';
}

function metricCardChip(key, v) {
  var ctxMap = { osi: 'osi', abq: 'abq', rcv: 'rcv', obr: 'obr', proj_osi: 'osi', pals: 'osi' };
  return valChip(v, ctxMap[key] || 'osi', false, 1);
}

function trendArrow(t) {
  var s = String(t == null ? '' : t).trim().toLowerCase();
  if (s === 'rising') return '<span class="trend-up" aria-hidden="true" title="OSI recent above season baseline">\u2191</span>';
  if (s === 'falling') return '<span class="trend-down" aria-hidden="true" title="OSI recent below season baseline">\u2193</span>';
  return '<span class="trend-flat" aria-hidden="true" title="Stable recent form">\u2192</span>';
}

var WOBA_FORM_UP = 0.025;
var WOBA_FORM_DOWN = -0.025;

function batterRecentWoba(name, team) {
  var rows = batterRateProfilesForPlayer(name, team);
  var recent = rowBySplitType(rows, 'recent');
  return recent ? num(pickCol(recent, ['wOBA', 'woba'])) : null;
}

function batterProfileTrendFallback(name, team, metricsSplit) {
  var profiles = batterProfilesForPlayer(name, team);
  if (!profiles.length) return 'stable';
  var splitType = metricsSplit === 'rhp' ? 'vs_RHP' : metricsSplit === 'lhp' ? 'vs_LHP' : 'overall';
  var row = rowBySplitType(profiles, splitType) || rowBySplitType(profiles, 'overall') || profiles[0];
  return String(pickCol(row, ['trend']) || 'stable').trim().toLowerCase();
}

function batterFormTrend(name, team, metricsSplit, spHand) {
  var metrics = batterMetricsForLineup(name, team, metricsSplit, spHand);
  var seasonWoba = metrics.woba;
  var recentWoba = batterRecentWoba(name, team);
  if (seasonWoba != null && recentWoba != null) {
    return {
      type: 'woba',
      delta: recentWoba - seasonWoba,
      recent: recentWoba,
      season: seasonWoba
    };
  }
  return { type: 'osi', trend: batterProfileTrendFallback(name, team, metricsSplit) };
}

function trendFormCell(trendPack) {
  if (!trendPack) {
    return '<span class="trend-flat" title="Insufficient form data">\u2014</span>';
  }
  if (trendPack.type === 'woba') {
    var d = trendPack.delta;
    if (d == null || isNaN(d)) {
      return '<span class="trend-flat" title="Insufficient form data">\u2014</span>';
    }
    var dir = d >= WOBA_FORM_UP ? 'up' : d <= WOBA_FORM_DOWN ? 'down' : 'flat';
    var arrow = dir === 'up' ? '\u2191' : dir === 'down' ? '\u2193' : '\u2192';
    var cls = dir === 'up' ? 'trend-up' : dir === 'down' ? 'trend-down' : 'trend-flat';
    var label = (d >= 0 ? '+' : '') + d.toFixed(3);
    return '<span class="' + cls + '" title="L30 wOBA ' + fmtSlashStat(trendPack.recent)
      + ' vs season ' + fmtSlashStat(trendPack.season) + ' (' + label + ')">' + arrow + '</span>';
  }
  return trendArrow(trendPack.trend);
}

function profileRow(team) {
  return DATA.profiles.find(function(p) { return teamKey(pickCol(p, ['team'])) === teamKey(team); });
}

function pitchTeamRow(team) {
  return DATA.pitchTeams.find(function(p) {
    return teamKey(pickCol(p, ['Tm', 'team'])) === teamKey(team);
  });
}

function encodePlayer(name) {
  return encodeURIComponent(name || '');
}

function normalizePlayerName(name) {
  return String(name || '').trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9 ]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

var NAME_SUFFIXES = /^(jr|sr|ii|iii|iv|v)$/i;

function playerLastName(name) {
  var parts = String(name || '').replace(/\./g, ' ').trim().split(/\s+/).filter(Boolean);
  while (parts.length > 1 && NAME_SUFFIXES.test(parts[parts.length - 1])) {
    parts.pop();
  }
  return parts.length ? parts[parts.length - 1].toLowerCase() : '';
}

function playerInitial(name) {
  var m = String(name || '').trim().match(/^([A-Za-z])\./);
  return m ? m[1].toLowerCase() : null;
}

function findRegistryEntry(name, team) {
  var direct = normalizePlayerName(name);
  var ln = playerLastName(name);
  var init = playerInitial(name) || (direct.split(' ')[0] || '').charAt(0);
  var t = teamKey(team);
  var hits = [];
  (DATA.registry || []).forEach(function(r) {
    var full = pickCol(r, ['full_name']);
    if (!full) return;
    var fn = normalizePlayerName(full);
    var score = 0;
    if (fn === direct) score = 100;
    else if (ln && playerLastName(full) === ln) {
      score = (!init || full.charAt(0).toLowerCase() === init) ? 85 : 60;
    }
    if (!score) return;
    if (teamKey(pickCol(r, ['team_abbr', 'team'])) === t) score += 10;
    hits.push({ row: r, score: score });
  });
  hits.sort(function(a, b) { return b.score - a.score; });
  return hits.length ? hits[0].row : null;
}

function resolvePlayerFullName(name, team) {
  var regHit = findRegistryEntry(name, team);
  if (regHit) return pickCol(regHit, ['full_name']);
  var profiles = batterProfilesForPlayer(name, team);
  if (profiles.length) {
    return pickCol(profiles[0], ['player_name', 'Player', 'Name']) || name;
  }
  return name;
}

function rowHasMetrics(row) {
  if (!row) return false;
  return num(pickCol(row, ['wOBA', 'woba'])) != null
    || num(pickCol(row, ['OPS', 'ops'])) != null
    || num(pickCol(row, ['OBP', 'obp'])) != null
    || num(pickCol(row, ['OSI', 'osi'])) != null;
}

function rowBySplitType(rows, splitType) {
  var want = String(splitType || '').toLowerCase();
  for (var i = 0; i < rows.length; i++) {
    var st = String(pickCol(rows[i], ['split_type', 'Split', '_rateSplit']) || '').toLowerCase();
    if (st === want) return rows[i];
  }
  return null;
}

function buildBatterRatePool() {
  function tag(rows, splitType) {
    return (rows || []).map(function(r) {
      var o = Object.assign({}, r);
      o._rateSplit = splitType;
      return o;
    });
  }
  DATA.batterRatePool = []
    .concat(tag(DATA.batterSplitsOverall, 'overall'))
    .concat(tag(DATA.batterSplitsRecent, 'recent'))
    .concat(tag(DATA.batterSplitsR, 'vs_RHP'))
    .concat(tag(DATA.batterSplitsL, 'vs_LHP'))
    .concat(tag(DATA.batterSplitsHome, 'home'))
    .concat(tag(DATA.batterSplitsAway, 'away'))
    .concat(tag(DATA.batterSplitsVsSp, 'vs_SP'))
    .concat(tag(DATA.batterSplitsVsRp, 'vs_RP'));
}

function batterRateProfilesForPlayer(name, team) {
  var resolved = findRegistryEntry(name, team);
  var resolvedName = resolved ? pickCol(resolved, ['full_name']) : name;
  var targets = [normalizePlayerName(resolvedName), normalizePlayerName(name)];
  var t = teamKey(team);
  var ln = playerLastName(resolvedName) || playerLastName(name);
  var init = playerInitial(name) || playerInitial(resolvedName) || (normalizePlayerName(name).split(' ')[0] || '').charAt(0);
  var scored = [];
  (DATA.batterRatePool || []).forEach(function(b) {
    var rawName = pickCol(b, ['player_name', 'Player', 'Name']);
    var bn = normalizePlayerName(rawName);
    var bt = teamKey(pickCol(b, ['team', 'Team', 'Tm']));
    var matchScore = 0;
    if (targets.indexOf(bn) >= 0) matchScore = 100;
    else if (ln && playerLastName(rawName) === ln) {
      var firstTok = (String(rawName || '').replace(/\./g, ' ').trim().split(/\s+/)[0] || '');
      matchScore = (!init || firstTok.charAt(0).toLowerCase() === init) ? 80 : 50;
    }
    if (!matchScore) return;
    if (bt && bt !== t) matchScore -= 15;
    scored.push({ row: b, score: matchScore });
  });
  scored.sort(function(a, b) { return b.score - a.score; });
  var out = [];
  var seenSplit = {};
  scored.forEach(function(s) {
    if (s.score < 50) return;
    var st = String(s.row._rateSplit || pickCol(s.row, ['split_type', 'Split']) || '').toLowerCase();
    var key = st + '|' + normalizePlayerName(pickCol(s.row, ['player_name', 'Player', 'Name']));
    if (seenSplit[key]) return;
    seenSplit[key] = true;
    out.push(s.row);
  });
  return out;
}

function blendSplitMetric(rowA, rowB, key) {
  var va = rowA ? num(pickCol(rowA, [key, key.toLowerCase()])) : null;
  var vb = rowB ? num(pickCol(rowB, [key, key.toLowerCase()])) : null;
  if (va != null && vb != null) return (va + vb) / 2;
  return va != null ? va : vb;
}

function metricsFromBatterRow(row) {
  if (!row) return { ops: null, obp: null, iso: null, woba: null };
  var obp = num(pickCol(row, ['OBP', 'obp']));
  var slg = num(pickCol(row, ['SLG', 'slg']));
  var ops = num(pickCol(row, ['OPS', 'ops']));
  if (ops == null && obp != null && slg != null) ops = obp + slg;
  return {
    ops: ops,
    obp: obp,
    iso: num(pickCol(row, ['ISO', 'iso'])),
    woba: num(pickCol(row, ['wOBA', 'woba']))
  };
}

function metricsFromBlend(rowA, rowB) {
  return {
    ops: blendSplitMetric(rowA, rowB, 'OPS'),
    obp: blendSplitMetric(rowA, rowB, 'OBP'),
    iso: blendSplitMetric(rowA, rowB, 'ISO'),
    woba: blendSplitMetric(rowA, rowB, 'wOBA')
  };
}

function lineupSplitCandidates(filter, spHand) {
  if (filter === 'sp') return ['vs_SP', 'vs_RHP', 'vs_LHP', 'overall', 'home', 'away', 'vs_RP'];
  if (filter === 'rp') return ['vs_RP', 'vs_RHP', 'vs_LHP', 'overall', 'home', 'away', 'vs_SP'];
  if (filter === 'rhp') return ['vs_RHP', 'vs_SP', 'vs_RP', 'overall', 'home', 'away', 'vs_LHP'];
  if (filter === 'lhp') return ['vs_LHP', 'vs_SP', 'vs_RP', 'overall', 'home', 'away', 'vs_RHP'];
  if (filter === 'home') return ['home', 'vs_RHP', 'vs_LHP', 'vs_SP', 'overall', 'away'];
  if (filter === 'away') return ['away', 'vs_RHP', 'vs_LHP', 'vs_SP', 'overall', 'home'];
  if (filter === 'f5') return ['vs_SP', 'vs_RHP', 'vs_LHP', 'overall', 'vs_RP'];
  if (spHand === 'L') return ['vs_LHP', 'vs_RHP', 'vs_SP', 'overall', 'home', 'away', 'vs_RP'];
  if (spHand === 'R') return ['vs_RHP', 'vs_LHP', 'vs_SP', 'overall', 'home', 'away', 'vs_RP'];
  return ['vs_RHP', 'vs_LHP', 'vs_SP', 'overall', 'home', 'away', 'vs_RP'];
}

function lineupSplitSubtitle(filter, spHand, windowKey) {
  var labels = {
    both: 'Blended platoon (RHP + LHP)',
    rhp: 'vs RHP split',
    lhp: 'vs LHP split',
    sp: 'vs starting pitching split',
    rp: 'vs bullpen split',
    home: 'Home split',
    away: 'Away split',
    f5: 'vs SP split (F5 proxy)'
  };
  var base = labels[filter] || 'Platoon split';
  if (filter === 'both' && spHand) base += ' · tonight vs ' + spHand + 'HP';
  if (windowKey && windowKey !== 'YTD') base += ' · batter metrics YTD';
  return base;
}

function batterProfilesForPlayer(name, team) {
  var resolved = findRegistryEntry(name, team);
  var resolvedName = resolved ? pickCol(resolved, ['full_name']) : name;
  var targets = [normalizePlayerName(resolvedName), normalizePlayerName(name)];
  var t = teamKey(team);
  var ln = playerLastName(resolvedName) || playerLastName(name);
  var init = playerInitial(name) || playerInitial(resolvedName) || (normalizePlayerName(name).split(' ')[0] || '').charAt(0);
  var scored = [];
  (DATA.batters || []).forEach(function(b) {
    var rawName = pickCol(b, ['player_name', 'Player', 'Name']);
    var bn = normalizePlayerName(rawName);
    var bt = teamKey(pickCol(b, ['team', 'Team', 'Tm']));
    var matchScore = 0;
    if (targets.indexOf(bn) >= 0) matchScore = 100;
    else if (ln && playerLastName(rawName) === ln) {
      var firstTok = (String(rawName || '').replace(/\./g, ' ').trim().split(/\s+/)[0] || '');
      matchScore = (!init || firstTok.charAt(0).toLowerCase() === init) ? 80 : 50;
    }
    if (!matchScore) return;
    if (bt && bt !== t) matchScore -= 15;
    scored.push({ row: b, score: matchScore });
  });
  scored.sort(function(a, b) { return b.score - a.score; });
  var out = [];
  var seenSplit = {};
  scored.forEach(function(s) {
    if (s.score < 50) return;
    var st = String(pickCol(s.row, ['split_type', 'Split']) || '').toLowerCase();
    var key = st + '|' + normalizePlayerName(pickCol(s.row, ['player_name']));
    if (seenSplit[key]) return;
    seenSplit[key] = true;
    out.push(s.row);
  });
  return out;
}

function batterMetricsForLineup(name, team, filter, spHand) {
  var rows = batterRateProfilesForPlayer(name, team);
  if (!rows.length) return metricsFromBatterRow(null);

  if (filter === 'both') {
    var rhp = rowBySplitType(rows, 'vs_RHP');
    var lhp = rowBySplitType(rows, 'vs_LHP');
    if (rowHasMetrics(rhp) && rowHasMetrics(lhp)) return metricsFromBlend(rhp, lhp);
    if (rowHasMetrics(rhp)) return metricsFromBatterRow(rhp);
    if (rowHasMetrics(lhp)) return metricsFromBatterRow(lhp);
  }

  var chain = lineupSplitCandidates(filter, spHand);
  for (var i = 0; i < chain.length; i++) {
    var hit = rowBySplitType(rows, chain[i]);
    if (rowHasMetrics(hit)) return metricsFromBatterRow(hit);
  }

  for (var j = 0; j < rows.length; j++) {
    if (rowHasMetrics(rows[j])) return metricsFromBatterRow(rows[j]);
  }
  return metricsFromBatterRow(null);
}

function lineupSpHand(team) {
  var game = tonightGame(team);
  if (!game) return null;
  var away = teamKey(pickCol(game, ['Away', 'away_team', 'Away_Team']));
  var hand = away === teamKey(team)
    ? pickCol(game, ['Home_Hand', 'home_hand', 'Home_SP_Hand', 'homeHand'])
    : pickCol(game, ['Away_Hand', 'away_hand', 'Away_SP_Hand', 'awayHand']);
  var s = String(hand || '').trim().toUpperCase();
  if (s.charAt(0) === 'L') return 'L';
  if (s.charAt(0) === 'R') return 'R';
  return null;
}

function todayLineupForTeam(team) {
  return (DATA.lineups || []).filter(function(r) {
    return teamKey(pickCol(r, ['Team', 'team'])) === teamKey(team);
  }).sort(function(a, b) {
    var ao = parseInt(pickCol(a, ['Bat_Order', 'Bat Order', 'bat_order']) || '99', 10);
    var bo = parseInt(pickCol(b, ['Bat_Order', 'Bat Order', 'bat_order']) || '99', 10);
    return ao - bo;
  });
}

function battingSectionSubtitle(team, ctx) {
  return 'Season qualified batters (50+ PA) · switch tabs for platoon splits';
}

function qualifiedBattersRosterList(team, metricsSplit, spHand) {
  var t = teamKey(team);
  var batters = (DATA.batters || []).filter(function(b) {
    return teamKey(pickCol(b, ['team', 'Team', 'Tm'])) === t && num(pickCol(b, ['PA'])) >= 50;
  });
  var byName = {};
  batters.forEach(function(b) {
    var n = pickCol(b, ['player_name', 'Player']);
    if (!n) return;
    if (!byName[n]) byName[n] = {};
    var st = pickCol(b, ['split_type', 'Split']);
    byName[n][st] = b;
    if (st === 'vs_RHP' || !byName[n].main) byName[n].main = b;
  });
  return Object.keys(byName).map(function(n) {
    var reg = findRegistryEntry(n, team);
    var m = batterMetricsForLineup(n, team, metricsSplit, spHand);
    return {
      name: n,
      pos: reg ? pickCol(reg, ['position']) : '',
      bats: reg ? pickCol(reg, ['bats']) : '',
      ops: m.ops,
      obp: m.obp,
      iso: m.iso,
      woba: m.woba,
      formTrend: batterFormTrend(n, team, metricsSplit, spHand)
    };
  }).sort(function(a, b) { return (b.woba || 0) - (a.woba || 0); });
}

function buildQualifiedBattersTableHtml(team, ctx, metricsSplit) {
  ctx = ctx || {};
  metricsSplit = metricsSplit || (ctx.split || (ctx.getSectionSplit && ctx.getSectionSplit('batting')) || 'both');
  var spHand = lineupSpHand(team);
  var rosterList = qualifiedBattersRosterList(team, metricsSplit, spHand);

  var body = profileTableOpen()
    + '<thead><tr><th>Name</th><th>Pos</th><th>Bats</th><th>OPS</th><th>OBP</th><th>ISO</th><th>wOBA</th><th>Form</th><th></th></tr></thead><tbody>';
  if (!rosterList.length) {
    body += '<tr><td colspan="9" class="tp-empty">No qualified batters (run batter profile pipeline)</td></tr>';
  } else {
    rosterList.forEach(function(b, idx) {
      body += '<tr><td>' + batterPlayerCellHtml(b.name, b.name, team, idx < 3) + '</td>'
        + '<td>' + escHtml(b.pos || '—') + '</td><td>' + escHtml(b.bats || '—') + '</td>'
        + '<td class="num">' + rateStatCell(b.ops, 'ops') + '</td>'
        + '<td class="num">' + rateStatCell(b.obp, 'obp') + '</td>'
        + '<td class="num">' + rateStatCell(b.iso, 'iso') + '</td>'
        + '<td class="num">' + rateStatCell(b.woba, 'woba') + '</td>'
        + '<td>' + trendFormCell(b.formTrend) + '</td>'
        + '<td><a class="ca-btn ca-btn--ghost ca-btn--sm" href="batter_profile.html?player=' + encodePlayer(b.name) + '">Profile</a></td></tr>';
    });
  }
  body += '</tbody>' + profileTableClose();
  return body;
}

function buildQualifiedBattersSplitBlock(title, hint, team, ctx, metricsSplit) {
  return '<div class="tp-batting-split">'
    + '<div class="tp-batting-split__head">'
    + '<h3 class="tp-batting-split__title">' + escHtml(title) + '</h3>'

    + '</div>'
    + buildQualifiedBattersTableHtml(team, ctx, metricsSplit)
    + '</div>';
}

function battingSplitTabPills(activeTab) {

    { value: 'season', label: 'Season Overview' },
    { value: 'rhp', label: 'vs RHP' },

function battingSplitPane(tabKey, activeTab, innerHtml) {
  var show = tabKey === activeTab;
  return '<div class="tp-batting-pane' + (show ? ' is-active' : '') + '" data-batting-split-pane="' + escHtml(tabKey) + '" role="tabpanel"' + (show ? '' : ' hidden') + '>'

    + '</div>';

function renderBattingSection(team, ctx) {
  ctx = ctx || {};
  var battingCtx = sectionCtx(ctx, 'batting', profileRow(STATE.team));

function bindBattingSplitTabs() {
  var root = document.getElementById('profileOffenseSections') || document.getElementById('profileStaffSections');
  if (!root) return;
  var section = root.querySelector('.tp-batting-section');
  if (!section) return;
  var active = STATE.battingSplitTab || 'season';
  section.querySelectorAll('[data-batting-split-tab]').forEach(function(btn) {
    var key = btn.getAttribute('data-batting-split-tab');
    btn.classList.toggle('active', key === active);
    btn.setAttribute('aria-selected', key === active ? 'true' : 'false');
    if (btn._battingSplitBound) return;
    btn._battingSplitBound = true;
    btn.addEventListener('click', function() {
      STATE.battingSplitTab = btn.getAttribute('data-batting-split-tab') || 'season';
      renderStaffBlock(profileRow(STATE.team) || {});
    });
  });
  section.querySelectorAll('[data-batting-split-pane]').forEach(function(pane) {
    var key = pane.getAttribute('data-batting-split-pane');
    var show = key === active;
    pane.hidden = !show;
    pane.classList.toggle('is-active', show);
  });
}

function escHtml(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function sectionHeaderHtml(title, subtitle, opts) {
  opts = typeof opts === 'string' ? { eyebrow: opts } : (opts || {});
  if (window.MLBMAAssets && MLBMAAssets.sectionHeaderHtml) {
    var hdr = {

function inferRoleFromLog(pid, name) {
  var apps = (DATA.log || []).filter(function(g) {
    return String(pickCol(g, ['pitcher_id'])) === String(pid) || pickCol(g, ['pitcher_name']) === name;
  });
  var saves = 0, holds = 0;
  apps.forEach(function(g) {
    var r = pickCol(g, ['result']);
    if (r === 'save') saves++;
    if (r === 'hold') holds++;
  });
  if (saves >= 2) return { label: 'Closer', cls: 'role-closer' };
  if (holds >= 3) return { label: 'Setup', cls: 'role-setup' };
  return { label: 'Middle', cls: '' };
}

function enrichProfileMatchups() {
  var S = window.MLBMASharedMatchup;
  if (!S || !S.parseMatchupRows) return;
  DATA.matchupsEnriched = S.parseMatchupRows(DATA.matchups || []);
  (DATA.matchupsEnriched || []).forEach(function(m) {
    if (m.awayOSI == null) {
      var ap = profileRow(m.away);
      if (ap) m.awayOSI = num(pickCol(ap, ['osi', 'OSI']));
    }
    if (m.homeOSI == null) {
      var hp = profileRow(m.home);
      if (hp) m.homeOSI = num(pickCol(hp, ['osi', 'OSI']));
    }
  });
  var schedP = (S.fetchMlbTodaySchedule)
    ? S.fetchMlbTodaySchedule().catch(function() { return LIVE_DATA._liveSchedule || { games: [] }; })
    : Promise.resolve(LIVE_DATA._liveSchedule || { games: [] });
  DATA.lineupsParsed = S.syncLiveLineupsFromSheet
    ? S.syncLiveLineupsFromSheet(DATA.lineups || [], DATA.matchupsEnriched, LIVE_DATA._liveSchedule || null)
    : (S.parseLineupRows ? S.parseLineupRows(DATA.lineups || []) : []);
  schedP.then(function(sched) {
    DATA.lineupsParsed = S.syncLiveLineupsFromSheet
      ? S.syncLiveLineupsFromSheet(DATA.lineups || [], DATA.matchupsEnriched, sched)
      : DATA.lineupsParsed;
    window.LIVE_DATA = window.LIVE_DATA || {};
    LIVE_DATA.matchups = DATA.matchupsEnriched;
    LIVE_DATA.lineups = DATA.lineupsParsed;
    LIVE_DATA._liveSchedule = sched;
    LIVE_DATA.spProfiles = DATA.sps || [];
    if (window._teamProfileRendered && typeof renderTeam === 'function') {
      try { renderTeam(STATE.team); } catch (e) { console.warn('[MLBMA] lineup refresh render failed', e); }
    }
  });
  window.LIVE_DATA = window.LIVE_DATA || {};
  LIVE_DATA.matchups = DATA.matchupsEnriched;
  LIVE_DATA.lineups = DATA.lineupsParsed || [];
  LIVE_DATA.spProfiles = DATA.sps || [];
}

function quadrantPosition(team, prof) {
  var osi = num(pickCol(prof, ['osi', 'OSI']));
  var gap = num(pickCol(prof, ['pp_gap', 'PP_Gap']));
  if (osi === null || gap === null) return { x: 50, y: 50 };
  var osis = DATA.profiles.map(function(p) { return num(pickCol(p, ['osi'])); }).filter(function(v) { return v !== null; });
  var gaps = DATA.profiles.map(function(p) { return num(pickCol(p, ['pp_gap'])); }).filter(function(v) { return v !== null; });
  var minO = Math.min.apply(null, osis), maxO = Math.max.apply(null, osis);
  var minG = Math.min.apply(null, gaps), maxG = Math.max.apply(null, gaps);
  var x = maxO > minO ? ((osi - minO) / (maxO - minO)) * 100 : 50;
  var y = maxG > minG ? (1 - (gap - minG) / (maxG - minG)) * 100 : 50;
  return { x: x, y: y };
}

function computeSpFx(team) {
  var sps = DATA.sps.filter(function(s) {
    return teamKey(pickCol(s, ['pitcher_team', 'pitcher team'])) === teamKey(team);
  });
  if (!sps.length) return null;
  var k = 0, bb = 0, er = 0, n = 0;
  sps.forEach(function(sp) {
    var kv = num(pickCol(sp, ['K_pct']));
    var bv = num(pickCol(sp, ['BB_pct']));
    var ev = num(pickCol(sp, ['ERA']));
    if (kv != null) { k += kv; n++; }
    if (bv != null) bb += bv;
    if (ev != null) er += ev;
  });
  if (!n) return null;
  return { k: k / n, bb: bb / sps.length, er: er / sps.length, pitch: null };
}

function unitChipToneClass(val, ctx, invert, dec, rank) {
  var A = window.MLBMAAssets;
  var chipCls = 'c-na';
  if (A && A.solidChipClass) {
    chipCls = (rank != null && chipClassFromRank(rank))
      ? chipClassFromRank(rank)
      : A.solidChipClass(val, ctx, invert, {});
  }
  var toneMap = { 'c-elite': 'elite', 'c-good': 'strong', 'c-mid': 'mid', 'c-weak': 'weak', 'c-poor': 'poor' };
  return toneMap[chipCls] || 'neutral';
}

function unitSnapshotChipRanked(label, val, rankMeta, ctx, invert, dec) {
  rankMeta = rankMeta || {};
  var rank = rankMeta.rank;

  var rankHtml = rank != null
    ? '<span class="tp-offense-stat__rank tp-offense-stat__rank--' + snapshotRankTone(rank) + '" title="' + escHtml(total ? ('League rank #' + rank + ' of ' + total) : ('League rank #' + rank)) + '">'
      + '<span class="tp-offense-stat__rank-num">#' + escHtml(String(rank)) + '</span>'
      + '</span>'
    : '';
  return '<div class="tp-offense-stat tp-offense-stat--inline" aria-label="' + escHtml(label) + '">'
    + '<span class="tp-offense-stat__label">' + escHtml(label) + '</span>'
    + '<span class="tp-offense-stat__body">' + rankedValChip(val, rank, ctx, invert, dec) + rankHtml + '</span>'
    + '</div>';
}

function unitSnapshotChip(label, val, ctx, invert, dec) {
  return unitSnapshotChipRanked(label, val, null, ctx, invert, dec);
}

function snapshotRankTone(rank) {
  if (rank == null || isNaN(rank)) return 'neutral';
  if (rank <= 5) return 'elite';
  if (rank <= 12) return 'strong';
  if (rank <= 20) return 'mid';
  return 'weak';
}

function chipClassFromRank(rank) {
  if (rank == null || isNaN(rank)) return null;
  if (rank <= 5) return 'c-elite';
  if (rank <= 12) return 'c-good';
  if (rank <= 20) return 'c-mid';
  return 'c-weak';
}

function rankedValChip(val, rank, ctx, invert, dec) {
  var d = dec == null ? 1 : dec;
  if (val == null || isNaN(val)) return valChip(val, ctx, invert, d);
  var chipClass = chipClassFromRank(rank);
  if (chipClass && window.MLBMAAssets && MLBMAAssets.valChipHtml) {
    return MLBMAAssets.valChipHtml(val, ctx, invert, d, { chipClass: chipClass });
  }
  return valChip(val, ctx, invert, d);
}

function computeRankAmong(team, rows, valueFn) {

    return { t: teamKey(pickCol(row, ['team', 'Team', 'tm'])), v: valueFn(row) };
  }).filter(function(r) { return r.t && r.v != null && !isNaN(r.v); })
    .sort(function(a, b) { return b.v - a.v; });
  for (var i = 0; i < scored.length; i++) {
    if (scored[i].t === key) return { rank: i + 1, total: scored.length };
  }
  return { rank: null, total: scored.length || null };
}

function renderUnitSnapshotStrip(prof, baseCtx) {
  var el = document.getElementById('tpUnitSnapshot');

  var Staff = window.TeamProfileStaff;

  if (cat === 'lineup') {
    el.innerHTML = '';
    el.hidden = true;
    syncIdentityStackLayout();
    return;
  } else if (cat === 'rotation') {
    el.hidden = false;
    var staffCtx = buildStaffCtx();
    var rotSplit = staffCtx.split || 'overall';
    var intelHtml = '';
    if (window.TeamProfileIntel && TeamProfileIntel.renderRotationStatus) {
      intelHtml = TeamProfileIntel.renderRotationStatus(prof, STATE.team, staffCtx);
    }
    var teamSps = (DATA.sps || []).filter(function(s) {
      return teamKey(pickCol(s, ['pitcher_team', 'pitcher team'])) === teamKey(STATE.team);
    });
    var avgPs = num(pickCol(prof, ['avg_pitching_score'])) || baseCtx.avgPitchScore;
    var rotEra = num(pickCol(prof, ['team_era']));
    var ipStart = num(pickCol(prof, ['avg_ip_per_start']));
    if (Staff && Staff.avgTeamSpMetric && rotSplit !== 'overall') {
      var psAvg = Staff.avgTeamSpMetric(teamSps, DATA, rotSplit, 'pitchScore', pickCol, num, teamKey, poolPitchScore);
      if (psAvg != null) avgPs = psAvg;
    }
    var tk = teamKey(STATE.team);
    var rotCache = Staff && Staff.buildTeamStaffCache
      ? Staff.buildTeamStaffCache(DATA, {
        split: rotSplit,
        scope: 'rotation',
        pickCol: pickCol,
        num: num,
        teamKey: teamKey,
        poolPitchScore: poolPitchScore
      })
      : {};
    var staffRank = Staff && Staff.staffLeagueRank ? Staff.staffLeagueRank.bind(Staff) : function() { return { rank: null, total: null }; };
    var chips = unitSnapshotChipRanked('Rotation Pitch Score', avgPs, staffRank(rotCache, tk, 'avgPs', false), 'pitching', false, 0)
      + unitSnapshotChipRanked('Rotation ERA', rotEra, staffRank(rotCache, tk, 'teamEra', true), 'era', true, 2)
      + unitSnapshotChipRanked('Rotation IP/Start', ipStart, staffRank(rotCache, tk, 'ipStart', false), 'ipstart', false, 1);
    el.innerHTML = intelHtml + unitSnapshotMetricsRow(chips);
    syncIdentityStackLayout();
    return;
  } else if (cat === 'bullpen') {
    el.hidden = false;
    var bpStaffCtx = buildStaffCtx();
    var bpIntel = '';
    if (window.TeamProfileIntel && TeamProfileIntel.renderBullpenStatus) {
      bpIntel = TeamProfileIntel.renderBullpenStatus(prof, STATE.team, bpStaffCtx);
    }
    var bpTk = teamKey(STATE.team);
    var bpCache = Staff && Staff.buildTeamStaffCache
      ? Staff.buildTeamStaffCache(DATA, {
        split: 'overall',
        scope: 'bullpen',
        pickCol: pickCol,
        num: num,
        teamKey: teamKey,
        poolPitchScore: poolPitchScore
      })
      : {};
    var bpEntry = bpCache[bpTk] || {};
    var bpUnit = Staff && Staff.bullpenUnitForTeam ? Staff.bullpenUnitForTeam(STATE.team, DATA, teamKey) : null;
    var snapBpScore = bpEntry.bpScore;
    if (snapBpScore == null && bpUnit && Staff.colVal) {
      var snapOsi = Staff.colVal(bpUnit, 'overall', 'OSI_allowed', pickCol, num);
      if (snapOsi == null) snapOsi = num(pickCol(prof, ['bullpen_osi_allowed']));
      if (snapOsi != null) snapBpScore = Math.max(0, Math.min(100, 100 - snapOsi));
    }
    var snapBpEra = bpEntry.bpEra;
    if (snapBpEra == null) snapBpEra = num(pickCol(prof, ['bullpen_era']));
    var snapBpWin = bpEntry.bpWinPct;
    var bpRank = Staff && Staff.staffLeagueRank ? Staff.staffLeagueRank.bind(Staff) : function() { return { rank: null, total: null }; };
    var bpChips = unitSnapshotChipRanked('Bullpen Pitch Score', snapBpScore, bpRank(bpCache, bpTk, 'bpScore', false), 'bp_score', false, 0)
      + unitSnapshotChipRanked('Bullpen ERA', snapBpEra, bpRank(bpCache, bpTk, 'bpEra', true), 'era', true, 2)
      + unitSnapshotChipRanked('Bullpen Win%', snapBpWin, bpRank(bpCache, bpTk, 'bpWinPct', false), 'rpwin', false, 1);
    el.innerHTML = bpIntel + unitSnapshotMetricsRow(bpChips);
    syncIdentityStackLayout();
    return;
  }
  syncIdentityStackLayout();
}

function bindTeamProfileFilters() {
  var main = document.querySelector('.ca-page-shell');
  if (!main || main._tpFiltersBound) return;
  main._tpFiltersBound = true;
  main.addEventListener('click', function(e) {
    var btn = e.target.closest('[data-tp-ctrl]');
    if (!btn) return;
    var bar = btn.closest('[data-tp-section]');
    var grp = btn.closest('[data-tp-ctrl-group]');
    if (!grp) return;
    var key = grp.getAttribute('data-tp-ctrl-group');
    var val = btn.getAttribute('data-tp-ctrl');
    var section = bar ? bar.getAttribute('data-tp-section') : null;

    if (section === 'lineup-context') {
      if (key === 'split') {
        syncLineupSectionSplits(val);
        renderTeam(STATE.team);
        return;
      }
      if (key === 'window') {
        STATE.window = val;
        renderTeam(STATE.team);
        return;
      }
    }
    if (key === 'split' && section) {
      // Independent per-section splits: only the clicked section re-renders, so each
      // lineup section keeps its own split. (Previously every lineup section was
      // force-synced to a single split followed by a full renderTeam, which made the
      // tables move together.)
      saveSectionSplit(section, val);
      rerenderTeamSection(section);
      return;
    }
    if (key === 'window' && section) {
      saveSectionWindow(section, val);
      rerenderTeamSection(section);
      return;
    }
    if (key === 'split') {
      saveSplitForCategory(STATE.category, val);
    } else if (key === 'window') {
      STATE.window = val;
    } else {
      return;
    }
    renderTeam(STATE.team);
  });
}

function rerenderTeamSection(sectionKey) {
  var prof = profileRow(STATE.team) || {};
  var name = TEAM_NAMES[STATE.team] || STATE.team;
  var tonight = buildTonightHtml(tonightGame(STATE.team));
  var baseCtx = buildMiniCtx(prof, name, tonight);

  if (sectionKey === 'identity') return;

  if (sectionKey === 'rotation' || sectionKey === 'bullpen' || sectionKey === 'batting') {
    if (sectionKey === 'batting') {
      html = renderBattingSection(STATE.team, sectionCtx(baseCtx, 'batting', prof));
      replaceSectionInDom('batting', html);
      bindBattingSplitTabs();
      return;
    }
    renderStaffBlock(prof);
    return;
  }

  var root = document.getElementById('profileOffenseSections');
  if (!root || !window.TeamProfileSections || !window.TeamProfileMini) return;
  var Sections = TeamProfileSections;
  var Mini = TeamProfileMini;
  var Intel = window.TeamProfileIntel;
  var html = '';

  if (sectionKey === 'offense') {
    var oCtx = sectionCtx(baseCtx, 'offense', prof);
    html = Sections.renderOffenseProfile(Mini.resolveView(prof, oCtx), prof, oCtx);
    replaceSectionInDom('offense-profile', html);
    return;
  }
  if (sectionKey === 'schedule') {
    var sCtx = sectionCtx(baseCtx, 'schedule', prof);
    html = Sections.renderScheduleContext(sCtx, sCtx.resultsRow, sCtx.window);
    replaceSectionInDom('schedule-context', html);
    return;
  }
  if (sectionKey === 'surface') {
    var win = activeSectionWindow('surface');
    html = Sections.renderSurfaceWins(baseCtx.resultsRow, win, baseCtx);
    replaceSectionInDom('surface-wins', html);
    return;
  }
  if (sectionKey === 'sustainability' && Intel) {
    var uCtx = sectionCtx(baseCtx, 'sustainability', prof);
    html = Intel.renderSustainabilitySection(Mini.resolveView(prof, uCtx), prof, uCtx);
    replaceSectionInDom('sustainability', html);
  }
}

    fetchSheetTab(TABS.batter_splits_away).catch(function() { return []; }),
    fetchSheetTab(TABS.batter_splits_vs_sp).catch(function() { return []; }),
    fetchSheetTab(TABS.batter_splits_vs_rp).catch(function() { return []; }),
    fetchSheetTab(TABS.team_results).catch(function() { return []; }),
    fetchSheetTab(TABS.pals).catch(function() { return []; }),
    fetchSheetTab(TABS.sp_metric_splits).catch(function() { return []; })
  ]);
  return Promise.all([syncP, coreP]).then(function(bundle) {
    assignProfileCoreData(bundle[1]);
    finalizeProfileData();
    splitP.then(function(splitRes) {
      assignProfileSplitData(splitRes);
      buildBatterRatePool();
      registerBatterRatePools();
      if (window._teamProfileRendered && typeof renderTeam === 'function') {
        try { renderTeam(STATE.team); } catch (e) { console.warn('[MLBMA] split refresh render failed', e); }
      }
    }).catch(function(err) {
      console.warn('[MLBMA] deferred profile splits failed', err);
    });
    if (window.MLBMAProfileControls && MLBMAProfileControls.buildTeamScores) {
      return MLBMAProfileControls.buildTeamScores().then(function() {
        if (MLBMAProfileControls.enrichTeamScoresWithProfiles) {
          MLBMAProfileControls.enrichTeamScoresWithProfiles(DATA.profiles);
        }
      });
    }
    var banner = document.getElementById('dataBanner');
    if (!DATA.profiles.length) {
      banner.textContent = 'Team_Profiles tab empty ? run pipeline steps 18?19 (compute_team_profile + push).';
      banner.classList.add('show');
    }
  });
}

var _profileWatchdogDone = null;
function showDelayedLoadBanner() {
  var banner = document.getElementById('dataBanner');
  if (banner) {
    banner.textContent = 'Data load delayed ? retrying?';
    banner.classList.add('show');
  }
}
function dismissLoading() {
  document.documentElement.style.overflow = '';
  document.body.style.overflow = '';
  document.body.classList.remove('mlbma-page-loading');
  if (window.MLBMA_UI && MLBMA_UI.hideLoadingOverlay) MLBMA_UI.hideLoadingOverlay();
  else if (window.MLBMA_UI && MLBMA_UI.finishLoading) MLBMA_UI.finishLoading();
}

document.addEventListener('DOMContentLoaded', function() {
  removeLegacyTopFilters();
  mountProfilePageHeader();
  if (window.MLBMA_UI && MLBMA_UI.startLoadWatchdog) {
    _profileWatchdogDone = MLBMA_UI.startLoadWatchdog(10000, showDelayedLoadBanner);
  }
  console.log('[MLBMA] team_profile loadAll start');
  initSelector();
  bindTeamProfileFilters();
  loadAll().then(function() {
    function paint() {
      try {
        window._teamProfileRendered = true;
        renderTeam(STATE.team);
      } catch (err) {
        console.error('[MLBMA] team_profile render failed:', err);
        var banner = document.getElementById('dataBanner');
        if (banner) {
          banner.textContent = 'Render error: ' + err.message;
          banner.classList.add('show');
        }
      }
    }
    if (window.MLBMAStandings) {
      return MLBMAStandings.load().then(paint).catch(function() { paint(); });
    }
    paint();
  }).catch(function(err) {
    document.getElementById('dataBanner').textContent = 'Load error: ' + err.message;
    document.getElementById('dataBanner').classList.add('show');
  }).finally(function() {
    dismissLoading();
    var ts = window.MLBMA_SHEET_BUST ? String(window.MLBMA_SHEET_BUST) : '—';
    ['lastUpdated', 'mobileLastUpdated'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.textContent = ts.length > 12 ? ts.slice(0, 16) : ts;
    });
    if (_profileWatchdogDone) _profileWatchdogDone();
  });
});
</script>
  <script src="chase_nav.js"></script>
</body>
