name: Deploy to Cloudflare (chase-analytics.com)

# Deploys the dashboard to the Cloudflare PAGES project "mlbma-pipeline-b" (the one
# chase-analytics.com is attached to) on every push to master — bypassing that project's
# broken Git build. Builds a clean web-only directory (no node_modules / Python source).
# Requires repo secrets CLOUDFLARE_API_TOKEN (with Pages:Edit) + CLOUDFLARE_ACCOUNT_ID.
#
# IMPORTANT: chase-analytics.com must serve the *production* deployment. The project was
# previously configured with production_branch=batter-profile-prop-rework while CI deploys
# from master, so wrangler uploads landed on master.*.pages.dev but the custom domain
# kept serving the stale default production URL. This workflow forces production_branch=master.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PAGES_PROJECT: mlbma-pipeline-b
      PRODUCTION_BRANCH: master
    steps:
      - uses: actions/checkout@v4

      - name: Build clean web-only directory
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude='.git' --exclude='.github' --exclude='node_modules' \
            --exclude='core' --exclude='outputs' --exclude='pipeline' \
            --exclude='scripts' --exclude='tests' --exclude='__pycache__' \
            --exclude='*.py' --exclude='*.pyc' --exclude='requirements.txt' \
            --exclude='*.md' --exclude='.env*' --exclude='wrangler.jsonc' \
            --exclude='.assetsignore' --exclude='_site' \
            ./ _site/
          echo "files to publish: $(find _site -type f | wc -l)"
          test -f _site/dashboard/matchup_shared.js
          grep -q hydrateMatchupPitcherStatsFromMlb _site/dashboard/matchup_shared.js

      - name: Point Pages production branch at master
        run: |
          RESP=$(curl -sS -X PATCH \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PAGES_PROJECT" \
            -d "{\"production_branch\":\"$PRODUCTION_BRANCH\"}")
          echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print('production_branch now:', (d.get('result') or {}).get('production_branch')); sys.exit(0 if d.get('success') else 1)"

      - name: Deploy to the Pages project (production)
        run: |
          cd _site
          npx --yes wrangler@4.40.0 pages deploy . \
            --project-name="$PAGES_PROJECT" \
            --branch="$PRODUCTION_BRANCH" \
            --commit-dirty=true

      - name: Verify chase-analytics.com serves fresh assets
        run: |
          URL="https://chase-analytics.com/dashboard/matchup_shared.js"
          for i in 1 2 3 4 5 6; do
            sleep 10
            BYTES=$(curl -fsSL "$URL" | wc -c | tr -d ' ')
            HAS=$(curl -fsSL "$URL" | grep -c hydrateMatchupPitcherStatsFromMlb || true)
            echo "attempt $i: bytes=$BYTES hydrate=$HAS"
            if [ "$BYTES" -gt 130000 ] && [ "$HAS" -ge 1 ]; then
              echo "Live site updated."
              exit 0
            fi
          done
          echo "ERROR: chase-analytics.com still serving stale matchup_shared.js"
          exit 1
