name: Deploy to Cloudflare (chase-analytics.com)

# Deploys the dashboard to the Cloudflare PAGES project "mlbma-pipeline-b" (the one
# chase-analytics.com is attached to) on every push to master — bypassing that project's
# broken Git build. Builds a clean web-only directory (no node_modules / Python source).
# Requires repo secrets CLOUDFLARE_API_TOKEN (with Pages:Edit) + CLOUDFLARE_ACCOUNT_ID.
#
# Git-integrated Pages projects treat wrangler direct uploads as branch previews, so
# chase-analytics.com (bound to canonical production) stayed on a stale Git build while
# master.mlbma-pipeline-b.pages.dev received fresh uploads. This workflow uploads to the
# master branch alias and points chase-analytics.com DNS at that alias.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PAGES_PROJECT: mlbma-pipeline-b
      PRODUCTION_BRANCH: master
      LIVE_DOMAIN: chase-analytics.com
      BRANCH_ALIAS: master.mlbma-pipeline-b.pages.dev
    steps:
      - uses: actions/checkout@v4

      - name: Build clean web-only directory
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude='.git' --exclude='.github' --exclude='node_modules' \
            --exclude='core' --exclude='outputs' --exclude='pipeline' \
            --exclude='scripts' --exclude='tests' --exclude='__pycache__' \
            --exclude='*.py' --exclude='*.pyc' --exclude='requirements.txt' \
            --exclude='*.md' --exclude='.env*' --exclude='wrangler.jsonc' \
            --exclude='.assetsignore' --exclude='_site' \
            ./ _site/
          echo "files to publish: $(find _site -type f | wc -l)"
          test -f _site/dashboard/matchup_shared.js
          grep -q hydrateMatchupPitcherStatsFromMlb _site/dashboard/matchup_shared.js

      - name: Pause Git auto-deploys and set production branch to master
        run: |
          RESP=$(curl -sS -X PATCH \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PAGES_PROJECT" \
            -d "{\"production_branch\":\"$PRODUCTION_BRANCH\",\"source\":{\"config\":{\"deployments_enabled\":false,\"production_deployments_enabled\":false}}}")
          echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('result') or {}; print('production_branch:', r.get('production_branch')); sys.exit(0 if d.get('success') else 1)"

      - name: Upload build to master branch alias
        run: |
          cd _site
          npx --yes wrangler@4.40.0 pages deploy . \
            --project-name="$PAGES_PROJECT" \
            --branch="$PRODUCTION_BRANCH" \
            --commit-dirty=true

      - name: Point chase-analytics.com DNS at master branch alias
        run: |
          python3 <<'PY'
          import json, os, sys, urllib.parse, urllib.request

          token = os.environ["CLOUDFLARE_API_TOKEN"]
          domain = os.environ["LIVE_DOMAIN"]
          target = os.environ["BRANCH_ALIAS"]

          def api(method, url, body=None):
              data = None if body is None else json.dumps(body).encode()
              req = urllib.request.Request(
                  url,
                  data=data,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                  },
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      return json.load(resp)
              except urllib.error.HTTPError as exc:
                  print(exc.read().decode(), file=sys.stderr)
                  raise

          zones = api("GET", f"https://api.cloudflare.com/client/v4/zones?name={urllib.parse.quote(domain)}")
          zone_list = zones.get("result") or []
          if not zone_list:
              print(f"No Cloudflare zone found for {domain}; skipping DNS update")
              sys.exit(0)
          zone_id = zone_list[0]["id"]
          print("zone:", zone_id)

          records = api(
              "GET",
              f"https://api.cloudflare.com/client/v4/zones/{zone_id}/dns_records?name={urllib.parse.quote(domain)}",
          ).get("result") or []
          if not records:
              print(f"No DNS records found for {domain}; skipping DNS update")
              sys.exit(0)

          updated = 0
          for rec in records:
              name = rec.get("name") or ""
              if name not in {domain, f"www.{domain}"}:
                  continue
              rec_type = rec.get("type")
              rec_id = rec.get("id")
              content = rec.get("content")
              if rec_type == "CNAME" and content == target:
                  print(f"already correct: {name} -> {target}")
                  continue
              if rec_type not in {"CNAME", "A", "AAAA"}:
                  print(f"skip unsupported record type {rec_type} for {name}")
                  continue
              body = {
                  "type": "CNAME",
                  "name": name,
                  "content": target,
                  "proxied": True,
                  "ttl": 1,
              }
              result = api(
                  "PATCH",
                  f"https://api.cloudflare.com/client/v4/zones/{zone_id}/dns_records/{rec_id}",
                  body,
              )
              if not result.get("success"):
                  print(json.dumps(result, indent=2), file=sys.stderr)
                  sys.exit(1)
              print(f"updated {name}: {rec_type} {content} -> CNAME {target}")
              updated += 1

          if updated == 0:
              print("No DNS records needed changes (or zone not managed here)")
          PY

      - name: Verify chase-analytics.com serves fresh assets
        run: |
          URL="https://${LIVE_DOMAIN}/dashboard/matchup_shared.js"
          for i in 1 2 3 4 5 6 8 10; do
            sleep "$i"
            BODY=$(curl -fsSL "$URL" || true)
            BYTES=$(printf '%s' "$BODY" | wc -c | tr -d ' ')
            HAS=$(printf '%s' "$BODY" | grep -c hydrateMatchupPitcherStatsFromMlb || true)
            echo "attempt $i: bytes=$BYTES hydrate=$HAS"
            if [ "$BYTES" -gt 130000 ] && [ "$HAS" -ge 1 ]; then
              echo "Live site updated."
              exit 0
            fi
          done
          echo "ERROR: chase-analytics.com still serving stale matchup_shared.js"
          exit 1
