name: Deploy to Cloudflare (chase-analytics.com)

# Deploys the dashboard to the Cloudflare PAGES project "mlbma-pipeline-b" (the one
# chase-analytics.com is attached to) on every push to master.
# Requires repo secrets CLOUDFLARE_API_TOKEN (with Pages:Edit) + CLOUDFLARE_ACCOUNT_ID.
#
# Git-integrated Pages treats wrangler direct uploads as branch previews, so the custom
# domain kept serving a stale Git production build. After uploading a clean _site build,
# we trigger a production deployment from master via the Pages API so canonical
# production (and chase-analytics.com) receives the latest commit.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PAGES_PROJECT: mlbma-pipeline-b
      PRODUCTION_BRANCH: master
      LIVE_DOMAIN: chase-analytics.com
    steps:
      - uses: actions/checkout@v4

      - name: Build clean web-only directory
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude='.git' --exclude='.github' --exclude='node_modules' \
            --exclude='core' --exclude='outputs' --exclude='pipeline' \
            --exclude='scripts' --exclude='tests' --exclude='__pycache__' \
            --exclude='*.py' --exclude='*.pyc' --exclude='requirements.txt' \
            --exclude='*.md' --exclude='.env*' --exclude='wrangler.jsonc' \
            --exclude='.assetsignore' --exclude='_site' \
            ./ _site/
          echo "files to publish: $(find _site -type f | wc -l)"
          test -f _site/dashboard/matchup_shared.js
          grep -q hydrateMatchupPitcherStatsFromMlb _site/dashboard/matchup_shared.js

      - name: Configure Pages for static master production deploys
        run: |
          RESP=$(curl -sS -X PATCH \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PAGES_PROJECT" \
            -d "{\"production_branch\":\"$PRODUCTION_BRANCH\",\"build_config\":{\"build_command\":\"\",\"destination_dir\":\"/\",\"root_dir\":\"\"},\"source\":{\"config\":{\"deployments_enabled\":false,\"production_deployments_enabled\":false}}}")
          echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('result') or {}; print('production_branch:', r.get('production_branch')); bc=r.get('build_config') or {}; print('destination_dir:', bc.get('destination_dir')); sys.exit(0 if d.get('success') else 1)"

      - name: Upload clean build to master branch alias
        run: |
          cd _site
          npx --yes wrangler@4.40.0 pages deploy . \
            --project-name="$PAGES_PROJECT" \
            --branch="$PRODUCTION_BRANCH" \
            --commit-hash="${{ github.sha }}" \
            --commit-message="${{ github.event.head_commit.message }}" \
            --commit-dirty=true

      - name: Trigger production deployment from master
        run: |
          python3 <<'PY'
          import json, os, sys, time, urllib.error, urllib.request

          token = os.environ["CLOUDFLARE_API_TOKEN"]
          account = os.environ["CLOUDFLARE_ACCOUNT_ID"]
          project = os.environ["PAGES_PROJECT"]
          branch = os.environ["PRODUCTION_BRANCH"]
          sha = os.environ.get("GITHUB_SHA", "")
          base = f"https://api.cloudflare.com/client/v4/accounts/{account}/pages/projects/{project}"

          def api(method, path, body=None):
              data = None if body is None else json.dumps(body).encode()
              req = urllib.request.Request(
                  f"{base}{path}",
                  data=data,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=120) as resp:
                      return json.load(resp)
              except urllib.error.HTTPError as exc:
                  print(exc.read().decode(), file=sys.stderr)
                  raise

          payload = {"branch": branch}
          if sha:
              payload["commit_hash"] = sha
          created = api("POST", "/deployments", payload)
          if not created.get("success"):
              print(json.dumps(created, indent=2), file=sys.stderr)
              sys.exit(1)
          dep = created.get("result") or {}
          dep_id = dep.get("id")
          print("Triggered production deployment:", dep_id, dep.get("url"))

          for attempt in range(72):
              time.sleep(10)
              info = api("GET", f"/deployments/{dep_id}").get("result") or {}
              stages = info.get("stages") or []
              latest = info.get("latest_stage") or (stages[-1] if stages else {})
              status = latest.get("status")
              name = latest.get("name")
              print(f"poll {attempt + 1}: stage={name} status={status}")
              if status == "success":
                  print("Production deployment succeeded:", info.get("url"))
                  sys.exit(0)
              if status in {"failure", "canceled"}:
                  print(json.dumps(info, indent=2), file=sys.stderr)
                  sys.exit(1)
          print("Timed out waiting for production deployment", file=sys.stderr)
          sys.exit(1)
          PY

      - name: Verify chase-analytics.com serves fresh assets
        run: |
          URL="https://${LIVE_DOMAIN}/dashboard/matchup_shared.js"
          for i in 1 2 3 4 5 6 8 10; do
            sleep "$i"
            BODY=$(curl -fsSL "$URL" || true)
            BYTES=$(printf '%s' "$BODY" | wc -c | tr -d ' ')
            HAS=$(printf '%s' "$BODY" | grep -c hydrateMatchupPitcherStatsFromMlb || true)
            echo "attempt $i: bytes=$BYTES hydrate=$HAS"
            if [ "$BYTES" -gt 130000 ] && [ "$HAS" -ge 1 ]; then
              echo "Live site updated."
              exit 0
            fi
          done
          echo "ERROR: chase-analytics.com still serving stale matchup_shared.js"
          exit 1
