name: Run MLBMA Pipeline

# Runs the full pipeline on a GitHub-hosted runner instead of a local machine.
# FanGraphs is always skipped here (headless Selenium bot-login is unreliable in
# CI) -- run scrape_fangraphs / scrape_batter_splits locally instead. Every other
# step is non-fatal by design (pipeline.main only hard-fails on scrape_savant), so
# a missing/expired secret degrades individual steps to SKIP/WARNING rather than
# failing the whole job.

on:
  workflow_dispatch:
  schedule:
    # 11:00 UTC ~= 6-7am US/Eastern (DST-dependent), matching the routine morning run.
    - cron: "0 11 * * *"

permissions:
  contents: read

concurrency:
  group: run-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Reconstruct google_credentials.json from secret
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          if [ -z "$GOOGLE_CREDENTIALS" ]; then
            echo "WARNING: GOOGLE_CREDENTIALS secret not set -- Sheets push steps will skip." >&2
          else
            printf '%s' "$GOOGLE_CREDENTIALS" > google_credentials.json
            python -c "import json; json.load(open('google_credentials.json')); print('google_credentials.json OK')"
          fi

      - name: Run pipeline (--skip-fangraphs)
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          FANGRAPHS_EMAIL: ${{ secrets.FANGRAPHS_EMAIL }}
          FANGRAPHS_PASSWORD: ${{ secrets.FANGRAPHS_PASSWORD }}
        run: python -u -m pipeline.main --skip-fangraphs
